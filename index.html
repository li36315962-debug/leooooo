                    { type: "景點", tag: "#必拍", tagColor: "purple", typeColor: "emerald", time: "14:00", title: "沙美摩洛哥", desc: "充滿北非異國情調的爆紅打卡頹屋群。", tip: "利用午後陽光直射在黃色泥牆的強烈陰影，人在土牆中庭拍出名模感。", info: "周邊設有公共停車場。可順便買閩式燒餅當伴手禮！" },
                    { type: "活動", tag: "#必吃", tagColor: "orange", typeColor: "orange", time: "15:30", title: "愜意甜點工作室", desc: "閩南古厝內的法式甜點店。", tip: "現代法式甜點擺在紅磚木桌上的反差萌，由上往下拍最美。", info: "請將愛車停在沙美車站，再步行進老街巷弄。" },
                    { type: "交通", tag: "#必買", tagColor: "amber", typeColor: "blue", time: "18:20", title: "立榮航空 B7-8962", desc: "金門尚義 (KNH) 18:20 → 台中清泉崗 (RMQ) 19:20", tip: "機場免稅店是高粱酒、貢糖、牛肉乾最後衝刺機會！", info: "17:20前抵達機場辦理還車手續與行李託運。" }
                ]
            }
        ];

        const infoStatus = document.getElementById('cloud-status');

        // 核心修正：網頁開啟時，不等 Firebase，直接暴力秒讀本地畫面
        window.addEventListener('DOMContentLoaded', () => {
            renderItinerary();
            connectFirebase();
        });

        function connectFirebase() {
            // 監聽雲端行程 (如果有資料就覆蓋本地，沒資料就同步本地上去)
            db.ref('kinmen_trip/itinerary').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    travelData = snapshot.val();
                    renderItinerary();
                } else {
                    // 雲端是空的，把預設資料存上去
                    db.ref('kinmen_trip/itinerary').set(travelData);
                }
                infoStatus.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-1"></i>雲端已同步`;
                infoStatus.className = "bg-emerald-50 text-emerald-600 text-[10px] font-bold px-2.5 py-1 rounded-full border border-emerald-200 animate-none";
            }, (error) => {
                // 如果本地 file:// 寫入受阻，依然維持運作
                infoStatus.innerHTML = `<i class="fa-solid fa-cloud text-amber-600 mr-1"></i>唯讀/本地模式`;
            });

            // 監聽雲端開支
            db.ref('kinmen_trip/expenses').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    expenses = Object.keys(data).map(key => data[key]);
                } else {
                    expenses = [];
                }
                renderExpenseList();
                calculateSettlement();
            });
        }

        function renderItinerary() {
            const container = document.getElementById('itinerary-container');
            let htmlStr = "";
            travelData.forEach((dayData, dayIdx) => {
                let itemsHtml = "";
                dayData.items.forEach((item, itemIdx) => {
                    const badgeStyles = { blue: "bg-blue-50 text-[#3B7AAE]", orange: "bg-orange-50 text-orange-600", emerald: "bg-emerald-50 text-emerald-600", purple: "bg-purple-50 text-purple-600", amber: "bg-amber-50 text-amber-700" };
                    itemsHtml += `
                        <div class="flex gap-3 relative group">
                            <div class="z-10 w-14 h-14 bg-white border-2 border-[#3B7AAE] rounded-full flex flex-col items-center justify-center text-center shadow-sm shrink-0">
                                <span class="text-[10px] text-gray-400 font-bold leading-none">${item.time}</span>
                                <span class="text-xs font-bold text-[#3B7AAE] mt-0.5">${item.type.slice(0,2)}</span>
                            </div>
                            <div class="flex-1 bg-white p-4 korean-card space-y-2 relative">
                                <button onclick="openEditModal(${dayIdx}, ${itemIdx})" class="absolute top-3 right-3 text-xs bg-gray-50 text-gray-400 px-2 py-1 rounded-lg border border-gray-100"><i class="fa-solid fa-pen-to-square"></i>編輯</button>
                                <div class="flex gap-1.5 items-center"><span class="inline-block ${badgeStyles[item.typeColor] || 'bg-gray-50'} text-[11px] font-bold px-2 py-0.5 rounded-md">${item.type}</span><span class="text-[11px] ${badgeStyles[item.tagColor] || 'bg-gray-50'} px-2 py-0.5 rounded-full font-medium">${item.tag}</span></div>
                                <h3 class="font-bold text-gray-800 text-base pr-12">${item.title}</h3>
                                <p class="text-xs text-gray-500">${item.desc}</p>
                                <div class="bg-slate-50 p-2.5 rounded-xl text-xs space-y-1 mt-1">
                                    <div class="text-gray-600"><span class="font-bold text-[#3B7AAE]">💡 拍照：</span>${item.tip}</div>
                                    <div class="text-gray-500"><span class="font-bold text-gray-600">🚗 交通：</span>${item.info}</div>
                                </div>
                            </div>
                        </div>`;
                });
                htmlStr += `
                    <section id="day${dayIdx + 1}" class="space-y-4 scroll-mt-20">
                        <div class="bg-fuji-blue text-white p-5 rounded-[24px] shadow-lg flex justify-between items-center relative overflow-hidden">
                            <div class="absolute right-[-10px] bottom-[-20px] text-white/10 text-7xl font-black">${dayIdx+1}</div>
                            <div><span class="bg-white/20 text-xs uppercase tracking-wider px-2 py-0.5 rounded font-bold">${dayData.day}</span><h2 class="text-xl font-bold mt-1">${dayData.theme}</h2><p class="text-xs text-blue-100 mt-0.5">${dayData.date}</p></div>
                            <i class="fa-solid ${dayData.icon} text-3xl text-blue-100/80"></i>
                        </div>
                        <div class="space-y-4 relative before:absolute before:inset-0 before:left-[27px] before:w-0.5 before:bg-gray-200/60 before:py-4">${itemsHtml}</div>
                        <div class="bg-[#3B7AAE]/5 border border-[#3B7AAE]/10 rounded-2xl p-4 mt-2 grid grid-cols-2 gap-3 text-xs text-gray-600">
                            <div class="bg-white p-2.5 rounded-xl border border-blue-100/40"><span class="font-bold block text-gray-800 mb-0.5">👗 建議穿著</span>${dayData.clothing}</div>
                            <div class="bg-white p-2.5 rounded-xl border border-blue-100/40"><span class="font-bold block text-gray-800 mb-0.5">☀️ 天氣提示</span>${dayData.weather}</div>
                        </div>
                    </section>`;
            });
            container.innerHTML = htmlStr;
        }

        function openEditModal(dayIdx, itemIdx) {
            const targetItem = travelData[dayIdx].items[itemIdx];
            document.getElementById('edit-day-idx').value = dayIdx;
            document.getElementById('edit-item-idx').value = itemIdx;
            document.getElementById('input-time').value = targetItem.time;
            document.getElementById('input-title').value = targetItem.title;
            document.getElementById('input-desc').value = targetItem.desc;
            document.getElementById('input-tip').value = targetItem.tip;
            document.getElementById('input-info').value = targetItem.info;
            showModalVisuals('edit-modal');
        }

        function saveItineraryChanges() {
            const dayIdx = document.getElementById('edit-day-idx').value;
            const itemIdx = document.getElementById('edit-item-idx').value;
            
            travelData[dayIdx].items[itemIdx].time = document.getElementById('input-time').value;
            travelData[dayIdx].items[itemIdx].title = document.getElementById('input-title').value;
            travelData[dayIdx].items[itemIdx].desc = document.getElementById('input-desc').value;
            travelData[dayIdx].items[itemIdx].tip = document.getElementById('input-tip').value;
            travelData[dayIdx].items[itemIdx].info = document.getElementById('input-info').value;
            
            renderItinerary(); // 本地先畫
            db.ref('kinmen_trip/itinerary').set(travelData).catch(()=>{}); // 嘗試同步
            closeModal('edit-modal');
        }

        // 記帳分帳控制
        function openBudgetModal() {
            setupBudgetModalForm();
            renderExpenseList();
            calculateSettlement();
            showModalVisuals('budget-modal');
        }

        function setupBudgetModalForm() {
            const payerContainer = document.getElementById('payer-radio-group');
            const sharerContainer = document.getElementById('sharer-checkbox-group');
            let p = "", s = "";
            members.forEach((m, idx) => {
                p += `<label class="flex items-center justify-center border border-gray-200 rounded-xl p-2 cursor-pointer bg-white text-xs has-[:checked]:bg-amber-100 has-[:checked]:border-amber-500 font-medium"><input type="radio" name="expense-payer" value="${m}" ${idx===0?'checked':''} class="hidden">${m}</label>`;
                s += `<label class="flex items-center justify-center border border-gray-200 rounded-xl p-2 cursor-pointer bg-white text-xs has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 font-medium"><input type="checkbox" name="expense-sharers" value="${m}" checked class="hidden">${m}</label>`;
            });
            payerContainer.innerHTML = p;
            sharerContainer.innerHTML = s;
        }

        function addExpenseRecord() {
            const pInput = document.getElementById('expense-purpose');
            const aInput = document.getElementById('expense-amount');
            const purpose = pInput.value.trim();
            const amount = parseFloat(aInput.value);

            if (!purpose || isNaN(amount) || amount <= 0) { alert("請填寫正確的項目與金額唷！"); return; }
            const payer = document.querySelector('input[name="expense-payer"]:checked').value;
            let sharers = [];
            document.querySelectorAll('input[name="expense-sharers"]:checked').forEach(cb => sharers.push(cb.value));
            if (sharers.length === 0) { alert("至少需勾選一位分攤旅伴喔！"); return; }

            const id = "exp_" + Date.now();
            const newRecord = { id, purpose, amount, payer, sharers };
            
            // 本地預模擬更新
            expenses.push(newRecord);
            renderExpenseList();
            calculateSettlement();

            // 同步雲端
            db.ref('kinmen_trip/expenses/' + id).set(newRecord).catch(()=>{});
            pInput.value = ""; aInput.value = "";
        }

        function renderExpenseList() {
            const container = document.getElementById('expense-list-container');
            let html = ""; let total = 0;
            if (expenses.length === 0) {
                container.innerHTML = `<div class="text-center text-xs text-gray-400 py-4">暫無消費明細。</div>`;
                document.getElementById('total-amount-display').innerText = `總計: $0`;
                return;
            }
            expenses.forEach(exp => {
                total += exp.amount;
                html += `
                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl text-xs border border-gray-100">
                        <div>
                            <div class="font-bold text-gray-800">${exp.purpose}</div>
                            <div class="text-gray-400"><span class="text-amber-600 font-medium">${exp.payer}</span> 墊 $${exp.amount}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-gray-700">$${exp.amount}</span>
                            <button onclick="deleteExpenseRecord('${exp.id}')" class="text-gray-300 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
            document.getElementById('total-amount-display').innerText = `總計: $${total}`;
        }

        function deleteExpenseRecord(id) {
            expenses = expenses.filter(e => e.id !== id);
            renderExpenseList();
            calculateSettlement();
            db.ref('kinmen_trip/expenses/' + id).set(null).catch(()=>{});
        }

        function calculateSettlement() {
            const resultsDiv = document.getElementById('settlement-results');
            let balances = {};
            members.forEach(m => balances[m] = 0);

            expenses.forEach(exp => {
                balances[exp.payer] += exp.amount;
                const perShare = exp.amount / exp.sharers.length;
                exp.sharers.forEach(s => balances[s] -= perShare);
            });

            let debtors = [], creditors = [];
            for (let name in balances) {
                let bal = Math.round(balances[name] * 100) / 100;
                if (bal < -0.1) debtors.push({ name, amount: Math.abs(bal) });
                else if (bal > 0.1) creditors.push({ name, amount: bal });
            }

            let transferProtocols = [];
            let dIdx = 0, cIdx = 0;
            while (dIdx < debtors.length && cIdx < creditors.length) {
                let debtor = debtors[dIdx]; let creditor = creditors[cIdx];
                let settleAmount = Math.min(debtor.amount, creditor.amount);
                if (settleAmount > 0.5) {
                    transferProtocols.push({ from: debtor.name, to: creditor.name, value: Math.round(settleAmount) });
                }
                debtor.amount -= settleAmount; creditor.amount -= settleAmount;
                if (debtor.amount < 0.5) dIdx++; if (creditor.amount < 0.5) cIdx++;
            }

            if (transferProtocols.length === 0) {
                resultsDiv.innerHTML = `<span class="text-gray-400">目前帳務平衡。</span>`;
                globalSettlementText = "📣 金門漫遊分帳報告：目前帳務平衡，互不相欠！";
                return;
            }

            let html = "";
            let lineText = "🗺️【金門離島漫遊 即時分帳通知】\n───────────────────\n";
            transferProtocols.forEach(p => {
                html += `<div class="flex items-center justify-between py-1 border-b border-dashed border-gray-100 last:border-0"><span>👤 <strong class="text-red-500">${p.from}</strong> 應轉帳給 <strong>${p.to}</strong></span><span class="font-bold text-[#3B7AAE]">$${p.value} 元</span></div>`;
                lineText += ` 💸【${p.from}】 ➡️ 給 【${p.to}】 💲$${p.value} 元\n`;
            });
            lineText += "───────────────────\n請大家確認後匯款回報唷！🙏🏻";
            resultsDiv.innerHTML = html;
            globalSettlementText = lineText;
        }

        function copyToLineClipboard() {
            navigator.clipboard.writeText(globalSettlementText).then(() => {
                alert("✨ 結算報告已成功複製！快貼到 LINE 群組通知旅伴吧！");
            });
        }

        function showModalVisuals(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.remove('translate-y-full');
        }
        
        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('translate-y-full');
        }
    </script>
</body>
</html>
