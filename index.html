                    { type: "景點", tag: "#必拍", tagColor: "purple", typeColor: "emerald", time: "14:00", title: "沙美摩洛哥 (沙美老街)", desc: "廢棄黃土頹屋群，充滿中東北非異國情調的爆紅打卡點。", tip: "利用午後陽光直射在黃色廢墟泥牆上的強烈陰影，人在土牆中庭拍照，宛如置身北非摩洛哥小鎮，極具神祕感。", info: "老街周邊設有公共停車場。此處也是買「沙美閩式燒餅」當作伴手禮的絕佳時機（#必買 推薦！）。" },
                    { type: "活動", tag: "#必吃", tagColor: "orange", typeColor: "orange", time: "15:30", title: "愜意甜點工作室", desc: "閩南傳統古厝內的精緻法式甜點魂，為金門行畫下完美句點。", tip: "將法式現代精緻蛋糕放在閩南古厝的磚紅木桌上，反差萌視覺非常吸睛。用俯視角度拍下甜點塔，畫面高雅。", info: "老街巷弄內不可停車。請將愛車停在沙美車站或公共停車場，再步行漫步穿過古色古香的巷弄。" },
                    { type: "交通", tag: "#必買", tagColor: "amber", typeColor: "blue", time: "18:20", title: "立榮航空 B7-8962", desc: "金門尚義 (KNH) 18:20 → 台中清泉崗 (RMQ) 19:20", tip: "機場免稅店是購買金門高粱酒、貢糖、牛肉乾與一條根的最終衝刺好機會！", info: "請於17:20前抵達金門尚義機場，先至外圍櫃檯辦理「還車手續」，隨後前往登機櫃檯託運行李與安檢。" }
                ]
            }
        ];

        // 核心渲染函式：將資料轉換為 HTML 內容
        function renderItinerary() {
            const container = document.getElementById('itinerary-container');
            let htmlStr = "";

            travelData.forEach((dayData, dayIdx) => {
                let itemsHtml = "";
                
                dayData.items.forEach((item, itemIdx) => {
                    // 色彩樣式映射對照
                    const badgeStyles = {
                        blue: "bg-blue-50 text-[#3B7AAE]",
                        orange: "bg-orange-50 text-orange-600",
                        emerald: "bg-emerald-50 text-emerald-600",
                        purple: "bg-purple-50 text-purple-600",
                        amber: "bg-amber-50 text-amber-700"
                    };

                    const tColor = badgeStyles[item.typeColor] || "bg-gray-50 text-gray-600";
                    const tagC = badgeStyles[item.tagColor] || "bg-gray-50 text-gray-600";

                    itemsHtml += `
                        <div class="flex gap-3 relative group">
                            <!-- 時間軸圖章 -->
                            <div class="z-10 w-14 h-14 bg-white border-2 border-[#3B7AAE] rounded-full flex flex-col items-center justify-center text-center shadow-sm shrink-0">
                                <span class="text-[10px] text-gray-400 font-bold leading-none">${item.time}</span>
                                <span class="text-xs font-bold text-[#3B7AAE] mt-0.5">${item.type.slice(0,2)}</span>
                            </div>
                            
                            <!-- 韓式行程卡片 -->
                            <div class="flex-1 bg-white p-4 korean-card space-y-2 relative">
                                <!-- 編輯按鈕 -->
                                <button onclick="openEditModal(${dayIdx}, ${itemIdx})" class="absolute top-3 right-3 text-xs bg-gray-50 hover:bg-blue-50 hover:text-[#3B7AAE] text-gray-400 px-2 py-1 rounded-lg transition-all flex items-center gap-1 border border-gray-100">
                                    <i class="fa-solid fa-pen-to-square"></i>編輯
                                </button>

                                <div class="flex gap-1.5 items-center">
                                    <span class="inline-block ${tColor} text-[11px] font-bold px-2 py-0.5 rounded-md">${item.type}</span>
                                    <span class="text-[11px] ${tagC} px-2 py-0.5 rounded-full font-medium">${item.tag}</span>
                                </div>
                                
                                <h3 class="font-bold text-gray-800 text-base pr-12">${item.title}</h3>
                                <p class="text-xs text-gray-500">${item.desc}</p>
                                
                                <div class="bg-slate-50 p-2.5 rounded-xl text-xs space-y-1.5 border border-gray-100/60 mt-1">
                                    <div class="text-gray-600"><span class="font-bold text-[#3B7AAE]">💡 拍照技巧：</span>${item.tip}</div>
                                    <div class="text-gray-500"><span class="font-bold text-gray-600">🚗 交通停車：</span>${item.info}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                htmlStr += `
                    <section id="day${dayIdx + 1}" class="space-y-4 scroll-mt-20">
                        <!-- Day 橫幅 -->
                        <div class="bg-fuji-blue text-white p-5 rounded-[24px] shadow-lg shadow-blue-900/10 flex justify-between items-center relative overflow-hidden">
                            <div class="absolute right-[-10px] bottom-[-20px] text-white/10 text-7xl font-black">${dayData.day.replace("ay ","")}</div>
                            <div>
                                <span class="bg-white/20 text-xs uppercase tracking-wider px-2 py-0.5 rounded font-bold">${dayData.day}</span>
                                <h2 class="text-xl font-bold mt-1">${dayData.theme}</h2>
                                <p class="text-xs text-blue-100 mt-0.5"><i class="fa-regular fa-calendar-days mr-1"></i> ${dayData.date}</p>
                            </div>
                            <i class="fa-solid ${dayData.icon} text-3xl text-blue-100/80"></i>
                        </div>

                        <!-- 垂直時間軌跡線 -->
                        <div class="space-y-4 relative before:absolute before:inset-0 before:left-[27px] before:w-0.5 before:bg-gray-200/60 before:py-4">
                            ${itemsHtml}
                        </div>

                        <!-- 建議穿著與天氣提示 -->
                        <div class="bg-[#3B7AAE]/5 border border-[#3B7AAE]/10 rounded-2xl p-4 mt-2 space-y-2">
                            <div class="flex items-center gap-2 text-sm font-bold text-[#3B7AAE]">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                                <span>${dayData.day} 導遊貼心小叮嚀</span>
                            </div>
                            <div class="grid grid-cols-2 gap-3 text-xs text-gray-600 pt-1">
                                <div class="bg-white p-2.5 rounded-xl border border-blue-100/40">
                                    <span class="font-bold block text-gray-800 mb-0.5">👗 建議穿著</span>
                                    ${dayData.clothing}
                                </div>
                                <div class="bg-white p-2.5 rounded-xl border border-blue-100/40">
                                    <span class="font-bold block text-gray-800 mb-0.5">☀️ 天氣提示</span>
                                    ${dayData.weather}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
            });

            container.innerHTML = htmlStr;
        }

        // 開啟編輯視窗並帶入既有數值
        function openEditModal(dayIdx, itemIdx) {
            const targetItem = travelData[dayIdx].items[itemIdx];
            
            document.getElementById('edit-day-idx').value = dayIdx;
            document.getElementById('edit-item-idx').value = itemIdx;
            
            document.getElementById('input-time').value = targetItem.time;
            document.getElementById('input-title').value = targetItem.title;
            document.getElementById('input-desc').value = targetItem.desc;
            document.getElementById('input-tip').value = targetItem.tip;
            document.getElementById('input-info').value = targetItem.info;

            // 彈出動畫邏輯
            const modal = document.getElementById('edit-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.remove('translate-y-full');
        }

        // 關閉編輯視窗
        function closeModal() {
            const modal = document.getElementById('edit-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('translate-y-full');
        }

        // 儲存修改至狀態陣列中並重新繪製畫面
        function saveItineraryChanges() {
            const dayIdx = document.getElementById('edit-day-idx').value;
            const itemIdx = document.getElementById('edit-item-idx').value;

            // 更新 JS 核心陣列資料
            travelData[dayIdx].items[itemIdx].time = document.getElementById('input-time').value;
            travelData[dayIdx].items[itemIdx].title = document.getElementById('input-title').value;
            travelData[dayIdx].items[itemIdx].desc = document.getElementById('input-desc').value;
            travelData[dayIdx].items[itemIdx].tip = document.getElementById('input-tip').value;
            travelData[dayIdx].items[itemIdx].info = document.getElementById('input-info').value;

            // 重新渲染畫面並關閉 Modal
            renderItinerary();
            closeModal();
        }

        // 初始化網頁時首次加載資料
        window.addEventListener('DOMContentLoaded', () => {
            renderItinerary();
        });
    </script>
</body>
</html>
